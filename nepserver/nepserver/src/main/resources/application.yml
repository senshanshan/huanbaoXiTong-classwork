server:
  port: 8080
  servlet:
    context-path: /nepm

logging:
  level:
    com.hw: debug

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/nep?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: admin
    password: 123456

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  # 原实体包是com.neusoft.nepm.pojo，修改别名扫描路径
  type-aliases-package: com.hw.po,com.neusoft.nepm.pojo,com.neusoft.nepm.dto
  configuration:
    map-underscore-to-camel-case: true # 开启下划线自动转驼峰（aqi_id → aqiId）

global-data:
  province-number: 34
  city-number: 106
